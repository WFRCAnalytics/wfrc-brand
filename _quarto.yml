# currently a quarto project is required for metadata or brand extensions to work
project:
  type: website
  output-dir: docs
  # brand.yml is explicitly set here even though _extension.yml also contributes it.
  # The contributes.metadata mechanism resolves brand: relative to the project root,
  # not the extension folder. Explicit path guarantees correct resolution.
  brand: _extensions/wfrc-brand/brand.yml

website:
  title: "Analytics"
  description: The Wasatch Front Regional Council builds consensus and enhances quality of life by developing and implementing visions and plans for a well-functioning multi-modal transportation system, livable communities, a strong economy, and a healthy environment.The Wasatch Front Regional Council builds consensus and enhances quality of life by developing and implementing visions and plans for a well-functioning multi-modal transportation system, livable communities, a strong economy, and a healthy environment.
  favicon: '_extensions/wfrc-brand/assets/logo/abbreviated/WFRC_logo_abbreviated_color_transparent.png'
  site-url: 'https://wfrcanalytics.github.io'

  # repo-url: 'https://https://github.com/WFRCAnalytics/wfrcanalytics.github.io'
  # repo-actions: [source, issue]

  # page-navigation: false
  # back-to-top-navigation: false
  # margin-header: subscribe.html

  announcement:
    icon: info-circle
    dismissable: true
    content: "**Alert** - This website currently contains mostly placeholder items and is currently under development."
    type: primary
    position: below-navbar

  twitter-card:
    creator: "@wasatchcouncil"
    site: "@wasatchcouncil"
    card-style: summary_large_image

  open-graph: true
  cookie-consent: false

  page-footer:
    left: © 2025 [Wasatch Front Regional Council](https://wfrc.utah.gov/)
    center:
      - icon: github
        href: https://github.com/WFRCAnalytics
        aria-label: GitHub
      - icon: facebook
        href: https://www.facebook.com/WasatchFrontRegionalCouncil
        aria-label: Facebook
      - icon: twitter-x
        href: https://twitter.com/wasatchcouncil
        aria-label: X (Twitter)
      - icon: instagram
        href: https://www.instagram.com/wasatchfrontregionalcouncil/
        aria-label: Instagram
      - icon: linkedin
        href: https://www.linkedin.com/company/wasatch-front-regional-council
        aria-label: LinkedIn
      - icon: youtube
        href: https://www.youtube.com/user/wfrcvideo
        aria-label: YouTube
    right:
      - text: Contact
        aria-label: Contact Form
        href: contact.qmd
      - text: License
        aria-label: License Details
        href: license.qmd

  navbar:
    # logo: '_extensions/wfrc-brand/assets/logo/horizontal/WFRC_logo_horizontal_color_transparent.png'
    logo-alt: 'Wasatch Front Regional Council'

    right:
      - text: Follow Us
        menu:
          # - icon: github
          #   text: GitHub
          #   href: https://github.com/WFRCAnalytics
          #   target: _blank
          - icon: facebook
            text: Facebook
            href: https://www.facebook.com/WasatchFrontRegionalCouncil
            target: _blank
          - icon: twitter-x
            text: X (Twitter)
            href: https://twitter.com/wasatchcouncil
            target: _blank
          - icon: instagram
            text: Instagram
            href: https://www.instagram.com/wasatchfrontregionalcouncil/
            target: _blank
          - text: LinkedIn
            icon: linkedin
            href: https://www.linkedin.com/company/wasatch-front-regional-council
            target: _blank
          - icon: youtube
            text: YouTube
            href: https://www.youtube.com/user/wfrcvideo
            target: _blank
    tools:
      - icon: github
        menu:
          - text: Source Code
            # icon: "code-slash"
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io
            target: _blank
          - text: Report a Bug
            # icon: "bug"
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io/issues/new
            target: _blank
          - text: Ask a Question
            # icon: "chat-right-text"
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io/discussions/new/choose
            target: _blank

format:
  html:
    axe: true
    page-layout: full
    grid:
      sidebar-width: 350px
    respect-user-color-scheme: true
    toc: true
    # Syntax highlighting — separate themes for light/dark give clear token differentiation.
    # github: blue keywords, green strings, red numbers, gray comments — clean on white bg.
    # dracula: green comments, pink keywords, yellow variables — clear on dark bg.
    highlight-style:
      light: github
      dark: dracula
    # Paths are relative to this _quarto.yml (project root).
    # format.html.theme cannot live in _extension.yml because Quarto resolves
    # contributes.metadata paths relative to project root, not the extension folder.
    theme:
      light:
        - cosmo
        - _extensions/wfrc-brand/assets/theme/wfrc.scss
        - _extensions/wfrc-brand/assets/theme/wfrc-light.scss
      dark:
        - _extensions/wfrc-brand/assets/theme/wfrc.scss
        - _extensions/wfrc-brand/assets/theme/wfrc-dark.scss

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: false
