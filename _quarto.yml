# _quarto.yml — per-project configuration only.
# Org-wide defaults (theme, highlight-style, favicon, twitter-card, open-graph,
# cookie-consent, footer left/center, navbar Follow Us, output-dir, freeze)
# are contributed automatically by _extensions/wfrc-brand/_extension.yml.

project:
  type: website
  output-dir: docs
  # brand.yml path must be explicit here — contributes.metadata resolves paths
  # relative to the project root, which works for downstream installs, but the
  # dev project also needs this explicit reference for correct resolution.
  brand: _extensions/wfrc-brand/brand.yml

website:
  # ── PER-PROJECT: change these for every new site ───────────────────────────
  title: "Analytics"
  description: "The Wasatch Front Regional Council builds consensus and enhances quality of life by developing and implementing visions and plans for a well-functioning multi-modal transportation system, livable communities, a strong economy, and a healthy environment."
  site-url: "https://wfrcanalytics.github.io"

  # ── PER-PROJECT: remove or update this announcement per deployment ─────────
  announcement:
    icon: info-circle
    dismissable: true
    content: "**Alert** - This website currently contains mostly placeholder items and is currently under development."
    type: primary
    position: below-navbar

  # ── PAGE FOOTER ────────────────────────────────────────────────────────────
  # IMPORTANT: page-footer is a YAML map. Quarto replaces the entire block
  # when the project defines ANY key under it — it does not merge key-by-key
  # with the extension's contribution. So left and center must be repeated
  # here even though they also live in the extension's contributes.metadata.
  # Downstream sites that define no page-footer at all get left+center
  # from the extension automatically.
  page-footer:
    left: "© 2025 [Wasatch Front Regional Council](https://wfrc.utah.gov/)"
    center:
      - icon: github
        href: https://github.com/WFRCAnalytics
        aria-label: GitHub
      - icon: facebook
        href: https://www.facebook.com/WasatchFrontRegionalCouncil
        aria-label: Facebook
      - icon: twitter-x
        href: https://twitter.com/wasatchcouncil
        aria-label: X (Twitter)
      - icon: instagram
        href: https://www.instagram.com/wasatchfrontregionalcouncil/
        aria-label: Instagram
      - icon: linkedin
        href: https://www.linkedin.com/company/wasatch-front-regional-council
        aria-label: LinkedIn
      - icon: youtube
        href: https://www.youtube.com/user/wfrcvideo
        aria-label: YouTube
    # Per-project: links to local pages that may not exist in every site
    right:
      - text: Contact
        aria-label: Contact Form
        href: contact.qmd
      - text: License
        aria-label: License Details
        href: license.qmd

  # ── NAVBAR ─────────────────────────────────────────────────────────────────
  # navbar.right (Follow Us) is also contributed by the extension, but since
  # navbar.tools is defined here, the full navbar block must be explicit.
  # Same list-replacement rule as page-footer: define everything you need.
  navbar:
    logo-alt: "Wasatch Front Regional Council"
    right:
      - text: Follow Us
        menu:
          - icon: facebook
            text: Facebook
            href: https://www.facebook.com/WasatchFrontRegionalCouncil
            target: _blank
          - icon: twitter-x
            text: X (Twitter)
            href: https://twitter.com/wasatchcouncil
            target: _blank
          - icon: instagram
            text: Instagram
            href: https://www.instagram.com/wasatchfrontregionalcouncil/
            target: _blank
          - icon: linkedin
            text: LinkedIn
            href: https://www.linkedin.com/company/wasatch-front-regional-council
            target: _blank
          - icon: youtube
            text: YouTube
            href: https://www.youtube.com/user/wfrcvideo
            target: _blank
    # Per-project: repo URLs differ per site
    tools:
      - icon: github
        menu:
          - text: Source Code
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io
            target: _blank
          - text: Report a Bug
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io/issues/new
            target: _blank
          - text: Ask a Question
            href: https://github.com/WFRCAnalytics/wfrcanalytics.github.io/discussions/new/choose
            target: _blank

format:
  html:
    # Theme, highlight-style, respect-user-color-scheme, axe, page-layout,
    # grid, and toc are contributed by the extension. Repeated here with full
    # _extensions/wfrc-brand/ paths so the dev project resolves them correctly.
    axe: true
    page-layout: full
    grid:
      sidebar-width: 350px
    toc: true
    respect-user-color-scheme: true
    highlight-style:
      light: github
      dark: dracula
    theme:
      light:
        - cosmo
        - _extensions/wfrc-brand/assets/theme/wfrc.scss
        - _extensions/wfrc-brand/assets/theme/wfrc-light.scss
      dark:
        - _extensions/wfrc-brand/assets/theme/wfrc.scss
        - _extensions/wfrc-brand/assets/theme/wfrc-dark.scss
