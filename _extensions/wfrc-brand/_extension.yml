title: wfrc-brand
author: Pukar Bhandari
version: 0.0.1
quarto-required: ">=1.8.0"
contributes:
  metadata:
    project:
      brand: brand.yml
    format:
      html:
        # This injects your SCSS automatically into any project using the extension
        light:
          # - "flatly"
          - cosmo
          - assets/theme/index.scss
          - assets/theme/theme-light.scss
        dark:
          # - "darkly"
          - assets/theme/index.scss
          - assets/theme/theme-dark.scss
  resources:
    - assets/
