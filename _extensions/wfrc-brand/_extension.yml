title: wfrc-brand
author: Pukar Bhandari
version: 0.0.8
quarto-required: ">=1.8.0"
contributes:
  # ── FORMAT CONTRIBUTIONS ───────────────────────────────────────────────────
  # contributes.formats.html resolves paths relative to the extension folder.
  # These are org-wide HTML rendering defaults applied to every WFRC website.
  formats:
    html:
      # Layout defaults — override per-document if needed (e.g. page-layout: article)
      axe: true
      page-layout: full
      toc: true
      number-sections: true
      number-depth: 2
      html-math-method: katex
      code-link: true
      code-tools: true
      grid:
        sidebar-width: 350px
      # Theme, highlighting, and color-scheme switching
      theme:
        light:
          - cosmo
          - assets/theme/wfrc.scss
          - assets/theme/wfrc-light.scss
        dark:
          - assets/theme/wfrc.scss
          - assets/theme/wfrc-dark.scss
      highlight-style:
        light: github
        dark: dracula
      respect-user-color-scheme: true
    typst:
      toc: true
      number-sections: true
      number-depth: 2
    docx:
      toc: true
      number-sections: true
      number-depth: 2

  # ── RESOURCES ──────────────────────────────────────────────────────────────
  resources:
    - assets/
